        /* Background Animation */

        .circle{
            position:absolute;
            border-radius:50%;
            background:rgba(255,255,255,0.2);

        }

        .circle1{
            width:220px;

        }

        .circle2{
            width:300px;
            height:300px;
            bottom:-100px;
            right:-100px;
            animation-delay:2s;
        }

        @keyframes float{

            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(20px);
            }

            100%{
                transform:translateY(0px);
            }

        }

        /* Login Box */

        .login-box{

            text-align:center;

            position:relative;

        }

        /* Input */

        .input-box{

            position:relative;
            margin-bottom:20px;

        }

        .input-box i{

            position:absolute;
            top:15px;
            left:15px;
            color:#555;
            font-size:18px;

        }

        .input-box input{

            width:100%;
            padding:14px 14px 14px 45px;

            border:none;
            border-radius:12px;

            background:rgba(255,255,255,0.9);

            font-size:15px;

        }

        .input-box input:focus{

            background:white;

        }

        /* Button */

        button{

            width:100%;
            padding:14px;

            border:none;

            background:white;

            font-size:16px;

            cursor:pointer;

        button:hover{
